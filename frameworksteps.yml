# File: frameworksteps.yml

parameters:
  OnlineUsername: ''
  OnlinePassword: ''
  BrowserType: ''
  OnlineUrl: ''
  TestAutomationURLFilePath: ''
  UsePrivateMode: ''
  LoginMethod: ''
  RepositoryName: 'PowerAppsTestAutomation'

steps:

# ✅ Set screen resolution (needed for UI tests)
- powershell: |
    Set-DisplayResolution -Width 1920 -Height 1080 -Force
    Start-Sleep -s 10
    Get-DisplayResolution
  displayName: 'Set Agent Screen Resolution'
  ignoreLASTEXITCODE: true

# ✅ Ensure correct .NET SDK
- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    packageType: 'sdk'
    version: '6.x'

# ✅ Install NuGet
- task: NuGetToolInstaller@1

# ✅ Clear NuGet cache
- script: dotnet nuget locals all --clear
  displayName: 'Clear NuGet Cache'

# ✅ Restore with runtime (IMPORTANT FIX)
- task: DotNetCoreCLI@2
  displayName: 'Restore Solution (win-x64)'
  inputs:
    command: 'restore'
    projects: '${{ parameters.RepositoryName }}/PowerAppsTestAutomation.sln'
    arguments: '--runtime win-x64'

# ✅ Optional: Explicit restore again for safety (same runtime)
- script: |
    echo "Ensuring restore with runtime..."
    dotnet restore ${{ parameters.RepositoryName }}/PowerAppsTestAutomation.sln --runtime win-x64
  displayName: 'Force Restore with Runtime'

# ✅ Build solution
- task: VSBuild@1
  displayName: 'Build Solution'
  inputs:
    solution: '${{ parameters.RepositoryName }}/PowerAppsTestAutomation.sln'
    platform: 'Any CPU'
    configuration: 'Debug'

# ✅ Run tests - Chrome
- task: VSTest@2
  displayName: 'Run Tests - Chrome'
  condition: or(eq('${{ parameters.BrowserType }}', 'Chrome'), eq('${{ parameters.BrowserType }}', 'All'))
  inputs:
    testAssemblyVer2: |
      ${{ parameters.RepositoryName }}\Microsoft.PowerApps.TestAutomation.Tests\bin\Debug\Microsoft.PowerApps.TestAutomation.Tests.dll
    testFiltercriteria: 'TestCategory=PowerAppsTestAutomation'
    uiTests: true
    runSettingsFile: '${{ parameters.RepositoryName }}/Microsoft.PowerApps.TestAutomation.Tests/patestautomation.runsettings'
    overrideTestrunParameters: >
      -OnlineUsername ${{ parameters.OnlineUsername }}
      -OnlinePassword ${{ parameters.OnlinePassword }}
      -BrowserType "Chrome"
      -OnlineUrl ${{ parameters.OnlineUrl }}
      -UsePrivateMode ${{ parameters.UsePrivateMode }}
      -TestAutomationURLFilePath ${{ parameters.TestAutomationURLFilePath }}
      -DriversPath $(ChromeWebDriver)
      -LoginMethod ${{ parameters.LoginMethod }}
    testRunTitle: 'Chrome UI Tests'
  continueOnError: true

# ✅ Run tests - Firefox
- task: VSTest@2
  displayName: 'Run Tests - Firefox'
  condition: or(eq('${{ parameters.BrowserType }}', 'Firefox'), eq('${{ parameters.BrowserType }}', 'All'))
  inputs:
    testAssemblyVer2: |
      ${{ parameters.RepositoryName }}\Microsoft.PowerApps.TestAutomation.Tests\bin\Debug\Microsoft.PowerApps.TestAutomation.Tests.dll
    testFiltercriteria: 'TestCategory=PowerAppsTestAutomation'
    uiTests: true
    runSettingsFile: '${{ parameters.RepositoryName }}/Microsoft.PowerApps.TestAutomation.Tests/patestautomation.runsettings'
    overrideTestrunParameters: >
      -OnlineUsername ${{ parameters.OnlineUsername }}
      -OnlinePassword ${{ parameters.OnlinePassword }}
      -BrowserType "Firefox"
      -OnlineUrl ${{ parameters.OnlineUrl }}
      -UsePrivateMode ${{ parameters.UsePrivateMode }}
      -TestAutomationURLFilePath ${{ parameters.TestAutomationURLFilePath }}
      -DriversPath $(GeckoWebDriver)
      -LoginMethod ${{ parameters.LoginMethod }}
    testRunTitle: 'Firefox UI Tests'
  continueOnError: true

# ✅ Debug (optional but helpful)
- script: dotnet list ${{ parameters.RepositoryName }}/PowerAppsTestAutomation.sln package
  displayName: 'List Installed NuGet Packages'
